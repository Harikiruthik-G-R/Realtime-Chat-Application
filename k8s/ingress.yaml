apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: realchat-ingress
  namespace: realchat
  # annotations:
  #   nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: realchat.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: realchat-client
            port:
              number: 3000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: realchat-server
            port:
              number: 5000