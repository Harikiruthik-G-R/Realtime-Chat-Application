apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: realchat
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: realchat-server
  namespace: realchat
spec:
  selector:
    app: realchat-server
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: realchat-client
  namespace: realchat
spec:
  selector:
    app: realchat-client
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort